<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Enhanced Android APK Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="msapplication-navbutton-color" content="#1a1a2e">
    
    <!-- Portrait orientation lock for Android -->
    <meta name="screen-orientation" content="portrait">
    <meta name="orientation" content="portrait">
    
    <!-- Prevent zoom and selection -->
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    
    <style>
      /* Enhanced Mobile Fullscreen CSS for Android APK */
      html, body {
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        margin: 0;
        padding: 0;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-text-size-adjust: 100%;
        
        /* Force portrait orientation */
        orientation: portrait;
        -webkit-transform: rotate(0deg);
        transform: rotate(0deg);
        
        /* Prevent system gestures */
        overscroll-behavior: none;
        touch-action: manipulation;
      }
      
      #root {
        height: 100vh;
        width: 100vw;
        position: fixed;
        top: 0;
        left: 0;
        overflow: hidden;
        background: #1a1a2e;
      }
      
      /* Hide scrollbars */
      ::-webkit-scrollbar {
        display: none;
      }
      
      /* Prevent zoom and system gestures while preserving game touch */
      * {
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-tap-highlight-color: rgba(0,0,0,0);
        outline: none;
      }
      
      /* Allow game elements to be interactive */
      button, .clickable, .game-ui, [role="button"] {
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: manipulation;
        pointer-events: auto;
      }
      
      /* Prevent accidental back gesture on Android */
      body {
        overscroll-behavior-x: none;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Enhanced Android APK Fullscreen and Orientation Control
      let orientationLocked = false;
      
      function hideSystemUI() {
        // Lock to portrait orientation on Android
        if (screen && screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('portrait').catch(() => {
            // Fallback for older browsers
            if (screen.lockOrientation) {
              screen.lockOrientation('portrait');
            } else if (screen.mozLockOrientation) {
              screen.mozLockOrientation('portrait');
            } else if (screen.msLockOrientation) {
              screen.msLockOrientation('portrait');
            }
          });
          orientationLocked = true;
        }
        
        // Hide status bar and navigation bar on Android
        if (window.StatusBar && window.StatusBar.hide) {
          window.StatusBar.hide();
        }
        if (window.NavigationBar && window.NavigationBar.hide) {
          window.NavigationBar.hide();
        }
        
        // Request fullscreen mode
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen().catch(() => {});
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen().catch(() => {});
        } else if (elem.mozRequestFullScreen) {
          elem.mozRequestFullScreen().catch(() => {});
        } else if (elem.msRequestFullscreen) {
          elem.msRequestFullscreen().catch(() => {});
        }
        
        // Set viewport height to account for mobile browsers
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      
      // Prevent landscape orientation
      function preventLandscape() {
        if (window.orientation === 90 || window.orientation === -90) {
          // Force portrait by rotating content if needed
          document.body.style.transform = 'rotate(0deg)';
          document.body.style.transformOrigin = 'center center';
          
          // Re-lock orientation if possible
          if (screen && screen.orientation && screen.orientation.lock && !orientationLocked) {
            screen.orientation.lock('portrait').catch(() => {});
          }
        }
      }
      
      // Initialize on load
      window.addEventListener('load', function() {
        hideSystemUI();
        preventLandscape();
      });
      
      // Handle orientation changes
      window.addEventListener('orientationchange', function() {
        setTimeout(function() {
          hideSystemUI();
          preventLandscape();
        }, 100);
      });
      
      // Handle resize events (for keyboard showing/hiding)
      window.addEventListener('resize', function() {
        hideSystemUI();
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      });
      
      // Prevent system gestures while preserving game touch controls
      document.addEventListener('touchstart', function(e) {
        // Allow touch on game UI elements
        const gameElements = ['button', '.clickable', '.game-ui', '[role="button"]', 'canvas'];
        const isGameElement = gameElements.some(selector => {
          if (selector.startsWith('.')) {
            return e.target.classList && e.target.classList.contains(selector.substring(1));
          } else if (selector.startsWith('[')) {
            const attr = selector.match(/\[([^=]+)(?:="([^"]*)")?\]/);
            return attr && e.target.hasAttribute(attr[1]);
          } else {
            return e.target.tagName && e.target.tagName.toLowerCase() === selector;
          }
        });
        
        // Only prevent default on non-game elements to avoid system gestures
        if (!isGameElement && (e.target === document.body || e.target === document.documentElement)) {
          e.preventDefault();
        }
      }, { passive: false });
      
      // Prevent back button on Android
      window.addEventListener('beforeunload', function(e) {
        // This will show a confirmation dialog on Android
        e.preventDefault();
        e.returnValue = '';
        return '';
      });
      
      // Handle Android back button in WebView/APK
      document.addEventListener('backbutton', function(e) {
        e.preventDefault();
        // Optionally show in-game menu instead of exiting
        return false;
      }, false);
      
      // Additional mobile optimizations
      window.addEventListener('focus', hideSystemUI);
      window.addEventListener('pageshow', hideSystemUI);
      
      // Disable context menus on long press (Android)
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
      });
      
      // Log orientation for debugging
      function logOrientation() {
        console.log('Orientation:', window.orientation || 'unknown');
        console.log('Screen dimensions:', window.screen.width, 'x', window.screen.height);
        console.log('Viewport dimensions:', window.innerWidth, 'x', window.innerHeight);
      }
      
      // Enable orientation logging in development
      window.addEventListener('orientationchange', logOrientation);
      window.addEventListener('load', logOrientation);
    </script>
  </body>
</html>
